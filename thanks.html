<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>お申込みありがとうございます｜カンボジア花火2026</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .thanks {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(245,196,81,.15) 0%, transparent 60%),
        var(--bg-deep);
    }
    .thanks__box {
      max-width: 560px;
      width: 100%;
    }
    .thanks__icon {
      font-size: 64px;
      margin-bottom: 16px;
      animation: pop .5s ease both;
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .thanks__title {
      font-family: var(--font-serif);
      font-size: clamp(24px, 5vw, 36px);
      color: var(--gold);
      margin: 0 0 12px;
      line-height: 1.4;
    }
    .thanks__lead {
      color: var(--text-sub);
      font-size: 15px;
      line-height: 1.9;
      margin: 0 0 40px;
    }
    /* LINE ボタン */
    .btn-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #06C755;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 28px;
      border-radius: 999px;
      text-decoration: none;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 8px 24px rgba(6,199,85,.35);
      margin-bottom: 12px;
    }
    .btn-line:hover { opacity: .88; transform: translateY(-2px); color: #fff; }
    .btn-line svg { width: 26px; height: 26px; flex-shrink: 0; }
    .thanks__note {
      font-size: 13px;
      color: var(--text-mute);
      line-height: 1.8;
      margin-top: 20px;
    }
    .thanks__note strong { color: var(--gold-2); }
    .thanks__back {
      display: inline-block;
      margin-top: 40px;
      color: var(--text-mute);
      font-size: 13px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 2px;
    }
    .thanks__back:hover { color: var(--gold); opacity: 1; }
    .divider-line {
      width: 60px; height: 1px;
      background: var(--border);
      margin: 32px auto;
    }
  </style>
</head>
<body>

</html>
